<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="オカズコントローラー">

    <title>オカズコントローラー Ver 5.0.0</title>
    <style>
        :root {
            --bg-color: #0f1215;
            --panel-bg: rgba(30, 39, 46, 0.85);
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --text-main: #f5f6fa;
            --text-sub: #d1d8e0;
            --gold: #d4af37;
            --card-bg: rgba(47, 54, 64, 0.9);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }

        input[type="text"],
        textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #orientation-alert {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 30000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @media screen and (orientation: landscape) and (pointer: coarse) {
            #orientation-alert {
                display: flex;
            }
        }

        #tap-guide {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        #tap-guide.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .guide-panel {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #333;
            text-align: center;
        }

        .guide-panel h2 { color: var(--gold); margin-top: 0; }
        .guide-panel ul { padding-left: 20px; margin: 20px 0; text-align: left; }
        .guide-panel li { margin-bottom: 10px; color: var(--text-sub); font-size: 0.9rem; }

        .start-btn {
            background: linear-gradient(135deg, #2c3e50, #000);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            cursor: pointer;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            border-bottom: 1px solid #333;
            z-index: 1000;
        }

        #status { font-weight: bold; font-size: 0.8rem; padding: 4px 12px; border-radius: 12px; }
        .status-waiting { background: #576574; color: #fff; }
        .status-loading { background: #f39c12; color: #fff; }
        .status-ready { background: #1dd1a1; color: #000; }

        .nav-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 6px;
            margin-left: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .view-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; transition: opacity 0.3s; }
        .hidden { display: none !important; }

        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            margin: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .slider-row label { width: 40px; font-size: 0.8rem; color: var(--gold); font-weight: bold; }
        .slider-row input { flex: 1; accent-color: var(--gold); }
        .val-disp { width: 55px; text-align: right; font-weight: bold; color: var(--text-main); font-family: monospace; }
        
        .mute-btn { background: #2f3640; border: none; border-radius: 8px; padding: 5px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .mute-btn img { width: 20px; filter: invert(1); }

        #main-content { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #pad-container { position: relative; width: 100%; height: 100%; max-width: 500px; }
        
        #body-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        #breathing-group { width: 100%; height: 100%; transform-origin: center center; }

        .breathing-trigger { animation: realistic-breath var(--move-duration) cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes realistic-breath { 0%, 100% { transform: scale(1.0); } 52% { transform: scale(1.05); } }
        
        .breathing-asthma { animation: asthma-breath var(--move-duration) cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }
        @keyframes asthma-breath { 0%, 100% { transform: scale(1.0); } 21.9% { transform: scale(1.06); } }

        .pad {
            position: absolute;
            width: 14%;
            height: 9%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            z-index: 1010;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
        }

        .active-pad {
            background: radial-gradient(circle, rgba(52, 152, 219, 0.6), transparent 70%) !important;
            border-color: var(--accent-blue) !important;
            color: #fff !important;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.4);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .selector-container {
            background: rgba(0,0,0,0.8);
            padding: 10px 0 20px;
            border-top: 1px solid #333;
        }

        .scroll-row { overflow-x: auto; white-space: nowrap; padding: 8px 10px; }
        .label-tag { font-size: 0.7rem; color: var(--gold); padding: 5px 15px; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 4px;
            font-size: 0.85rem;
            border: 1px solid #444;
            border-radius: 12px;
            background: #1a1a1a;
            color: var(--text-sub);
            cursor: pointer;
        }

        .btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn.heart-btn.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        #bbs-view { background: var(--bg-color); }
        .bbs-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; }

        .bbs-form { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .bbs-form input, .bbs-form textarea { background: #2d3436; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; }
        .bbs-form button { background: var(--accent-blue); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        .post-card { background: #1e272e; border-radius: 12px; padding: 15px; margin: 10px; border: 1px solid #333; }
        .delete-btn { background: rgba(231, 76, 60, 0.2); color: var(--accent-red); border: 1px solid var(--accent-red); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; float: right; }

        .admin-toggle { background: transparent; border: none; color: #555; cursor: pointer; display: block; margin: 10px auto; }
        #footer-ver { padding: 20px 0; color: #555; text-align: center; font-size: 0.6rem; }
    </style>
</head>

<body oncontextmenu="return false;">
    <div id="orientation-alert">
        <div style="font-size: 40px; margin-bottom: 10px;">📱</div>
        <p style="font-weight: bold; color: #fff;">このアプリは縦向き専用です<br>スマホを立てて操作してください</p>
    </div>

    <div id="tap-guide">
        <div class="guide-panel">
            <h2>【使用方法】</h2>
            <ul>
                <li><strong>聴診</strong>：パット（円）をタップし続けると音が鳴ります。</li>
                <li><strong>切り替え</strong>：下部のボタンで症例を変更できます。</li>
                <li><strong>調節</strong>：上部のスライダーで回数や音量を調整可能です。</li>
            </ul>
            <button class="start-btn" onclick="initAudio()">了解して開始する</button>
        </div>
    </div>

    <div id="header">
        <div id="status" class="status-waiting">待機中</div>
        <div id="header-right">
            <button class="nav-btn" onclick="location.reload();">更新</button>
            <button class="nav-btn" id="fb-nav-btn" onclick="switchView('bbs')">掲示板</button>
        </div>
    </div>

    <div id="main-view" class="view-container">
        <div class="control-panel">
            <div class="slider-row">
                <label>呼吸</label>
                <input type="range" id="rr-slider" min="10" max="25" step="1" value="18">
                <div class="val-disp"><span id="rr-val">18</span><small>回</small></div>
                <button id="lung-mute" class="mute-btn"><img src="vol_on.png" id="lung-mute-img"></button>
            </div>
            <div class="slider-row">
                <label>心拍</label>
                <input type="range" id="hr-slider" min="40" max="120" step="1" value="70">
                <div class="val-disp"><span id="hr-val">70</span><small>bpm</small></div>
                <button id="heart-mute" class="mute-btn"><img src="vol_on.png" id="heart-mute-img"></button>
            </div>
        </div>

        <div id="main-content">
            <div id="pad-container">
                <div id="breathing-group">
                    <img src="body_image.jpg" alt="body" id="body-img">
                    <div class="pad" id="pad-btn9" style="top: 30%; left: 50%;">9</div>
                    <div class="pad" id="pad-btn1" style="top: 32%; left: 30%;">1</div>
                    <div class="pad" id="pad-btn2" style="top: 32%; left: 70%;">2</div>
                    <div class="pad" id="pad-btn3" style="top: 45%; left: 33%;">3</div>
                    <div class="pad" id="pad-btn4" style="top: 45%; left: 67%;">4</div>
                    <div class="pad" id="pad-btn5" style="top: 59%; left: 37%;">5</div>
                    <div class="pad" id="pad-btn6" style="top: 59%; left: 63%;">6</div>
                    <div class="pad" id="pad-btn7" style="top: 57%; left: 18%;">7</div>
                    <div class="pad" id="pad-btn8" style="top: 57%; left: 82%;">8</div>
                </div>
            </div>
        </div>

        <div class="selector-container">
            <span class="label-tag">呼吸音症例</span>
            <div id="lung-row" class="scroll-row">
                <button class="btn lung-btn active" data-folder="normal">正常呼吸音</button>
                <button class="btn lung-btn" data-folder="fc">間質性肺炎</button>
                <button class="btn lung-btn" data-folder="left_pneumo">右気胸</button>
                <button class="btn lung-btn" data-folder="right_pneumo">左気胸</button>
                <button class="btn lung-btn" data-folder="asthma">喘息発作</button>
                <button class="btn lung-btn" data-folder="pleuritis">胸膜炎</button>
            </div>
            <span class="label-tag">心音症例</span>
            <div id="heart-row" class="scroll-row">
                <button class="btn heart-btn active" data-folder="normal">正常心音</button>
                <button class="btn heart-btn" data-folder="as">大動脈弁狭窄症</button>
                <button class="btn heart-btn" data-folder="ar">大動脈弁閉鎖不全症</button>
                <button class="btn heart-btn" data-folder="ms">僧帽弁狭窄症</button>
                <button class="btn heart-btn" data-folder="mr">僧帽弁閉鎖不全症</button>
            </div>
        </div>
    </div>

    <div id="bbs-view" class="view-container hidden">
        <div class="bbs-header">
            <h3>💬 掲示板</h3>
            <button class="back-btn" onclick="switchView('main')">戻る</button>
        </div>
        <div class="bbs-form">
            <input type="text" id="bbs-name" placeholder="名前 (任意)" maxlength="20">
            <textarea id="bbs-msg" placeholder="コメントを入力" rows="2" maxlength="200"></textarea>
            <button onclick="postMessage()" id="bbs-submit-btn">送信する</button>
        </div>
        <div class="bbs-content">
            <div id="bbs-list"></div>
            <button class="admin-toggle" onclick="toggleAdminMode()">🔧</button>
        </div>
        <div id="footer-ver">オカズコントローラー Ver 5.0.0</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyRg0NM1SVIVCnYOuPfIAZlEBiQO8wEScL1ADx4hYTX5IEvEPzYLgdbgmWq-irMZODA/exec";
        let audioStarted = false;
        let players = { normal_v: null, extra_v: null, bronchial: null, heart: null };
        let lungFilter = null; // 肺音用ローパスフィルター
        let clickSynth = null;
        let rrValue = 18, hrValue = 70;
        let lungFolder = "normal", heartFolder = "normal";
        let masterLoop = null, heartLoop = null, activePadId = null;
        let lungVolumeState = 0, heartVolumeState = 0;
        const volLevels = [0, -Infinity, -10.5, -4.4];
        const volIcons = ["vol_on.png", "vol_off.png", "vol_low.png", "vol_mid.png"];

        function switchView(viewName) {
            triggerClickSound();
            const main = document.getElementById('main-view');
            const header = document.getElementById('header');
            const bbs = document.getElementById('bbs-view');
            if (viewName === 'bbs') {
                main.style.opacity = '0'; header.style.opacity = '0';
                setTimeout(() => { main.classList.add('hidden'); header.classList.add('hidden'); bbs.classList.remove('hidden'); setTimeout(() => { bbs.style.opacity = '1'; }, 50); }, 300);
            } else {
                bbs.style.opacity = '0';
                setTimeout(() => { bbs.classList.add('hidden'); main.classList.remove('hidden'); header.classList.remove('hidden'); setTimeout(() => { main.style.opacity = '1'; header.style.opacity = '1'; }, 50); }, 300);
            }
        }

        async function initAudio() {
            if (audioStarted) return;
            document.getElementById('tap-guide').classList.add('fade-out');
            await Tone.start();
            audioStarted = true;
            setTimeout(() => { document.getElementById('tap-guide').style.display = 'none'; }, 600);

            // 肺音用の低域通過フィルタ（1000Hz以上をカット）を初期化
            lungFilter = new Tone.Filter(1000, "lowpass").toDestination();

            clickSynth = new Tone.FMSynth({ modulationIndex: 2, envelope: { attack: 0.001, decay: 0.1, sustain: 0.01, release: 0.1 }, modulation: { type: "square" } }).toDestination();
            clickSynth.volume.value = -12;
            loadLungSounds();
            fetchPosts();
        }

        let isAdminMode = false;
        let postsData = [];

        function toggleAdminMode() {
            if (!isAdminMode) {
                const pwd = prompt("管理者パスワードを入力してください");
                // ※ ここではブラウザ上の簡易パスワードですが、GAS側でも確認することを推奨します。
                if (pwd === "admin123") {
                    isAdminMode = true;
                    alert("管理者モードを有効にしました。");
                } else {
                    if (pwd !== null) alert("パスワードが違います。");
                    return;
                }
            } else {
                isAdminMode = false;
                alert("管理者モードを無効にしました。");
            }
            renderPosts();
        }

        async function fetchPosts() {
            try {
                // キャッシュを回避するために URL にタイムスタンプを付与
                const cacheBustUrl = GAS_URL + (GAS_URL.indexOf('?') > -1 ? '&' : '?') + "_=" + new Date().getTime();
                const res = await fetch(cacheBustUrl);
                postsData = await res.json();
                renderPosts();
            } catch (e) {
                console.error("Fetch error:", e);
                // 読み込み中表示を消すためのフォールバック
                if (postsData.length === 0) renderPosts();
            }
        }

        function renderPosts() {
            const list = document.getElementById('bbs-list');
            if (!postsData || postsData.length === 0) {
                list.innerHTML = '<p style="color:#999; font-size:0.8rem; text-align:center;">まだ書き込みがありません。</p>';
                return;
            }
            list.innerHTML = postsData.map((p, index) => {
                // GASから id が返却される想定、ない場合はフォールバックとしてindexを使用
                const postId = p.id !== undefined ? p.id : index;
                const delBtn = isAdminMode ? `<button class="delete-btn" onclick="deleteMessage('${postId}')">削除</button>` : '';
                return `<div class="post-card">${delBtn}<div style="font-size:0.75rem; color:#999;">${p.name || '名無し'}</div><div style="font-size:0.9rem; white-space:pre-wrap; word-break:break-word;">${p.message}</div></div>`;
            }).join('');
        }

        async function postMessage() {
            const nameEl = document.getElementById('bbs-name');
            const msgEl = document.getElementById('bbs-msg');
            const btn = document.getElementById('bbs-submit-btn');

            const message = msgEl.value.trim();
            if (!message) return alert("コメントを入力してください");

            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                // 通信エラーを避けるため、POSTではなくGET（URLパラメータ）で送信
                const params = new URLSearchParams();
                params.append('action', 'post');
                params.append('name', nameEl.value.trim() || '名無し');
                params.append('message', message);

                const sendUrl = GAS_URL + (GAS_URL.indexOf('?') > -1 ? '&' : '?') + params.toString();

                // GETリクエストで送信
                const res = await fetch(sendUrl);
                const result = await res.json();

                if (result.success) {
                    msgEl.value = '';
                    alert("送信しました！");
                    fetchPosts();
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                console.error(e);
                // 完全に成功したか不明な場合も、一旦成功扱いで再読込を試る
                msgEl.value = '';
                alert("送信リクエストを送りました。反映されない場合は「更新」を押してください。");
                setTimeout(fetchPosts, 3000);
            } finally {
                btn.disabled = false;
                btn.innerText = "送信する";
            }
        }

        async function deleteMessage(id) {
            if (!confirm("この投稿を削除しますか？")) return;
            try {
                const params = new URLSearchParams();
                params.append('action', 'delete');
                params.append('id', id);

                const delUrl = GAS_URL + (GAS_URL.indexOf('?') > -1 ? '&' : '?') + params.toString();

                const res = await fetch(delUrl);
                const result = await res.json();

                if (result.success) {
                    alert("削除しました。");
                    fetchPosts();
                }
            } catch (e) {
                console.error(e);
                alert("削除リクエストを送信しました。");
                setTimeout(fetchPosts, 3000);
            }
        }

        function loadLungSounds() {
            const status = document.getElementById('status');
            status.innerText = "読込中..."; status.className = "status-loading";

            Tone.Transport.stop();
            ['normal_v', 'extra_v', 'bronchial'].forEach(k => {
                if (players[k]) {
                    players[k].stop();
                    // players[k].dispose(); // Tone.jsのキャッシュバグ回避のため破棄しない
                    players[k] = null;
                }
            });

            const paths = { normal_v: `./soundsource/normal/vesicular.wav`, extra_v: `./soundsource/${lungFolder}/vesicular.wav`, bronchial: `./soundsource/${lungFolder}/bronchial.wav` };
            if (lungFolder === "asthma") paths.extra_v = `./soundsource/${lungFolder}/wheeze.wav`;
            if (lungFolder === "fc") paths.extra_v = `./soundsource/${lungFolder}/fine_crackles.wav`;
            if (lungFolder === "pleuritis") paths.extra_v = `./soundsource/${lungFolder}/friction_rub.wav`;

            let loaded = 0;
            const keys = Object.keys(paths);
            keys.forEach(key => {
                players[key] = new Tone.Player({
                    url: paths[key],
                    volume: -Infinity,
                    onload: () => {
                        if (++loaded === keys.length) {
                            status.innerText = "準備完了"; status.className = "status-ready";
                            startLungLoop();
                        }
                    },
                    onerror: (e) => {
                        console.error(`Audio load error [${key}]:`, e);
                        status.innerText = "エラー";
                    }
                }).connect(lungFilter); // フィルタに接続
            });
            loadHeartSound();
        }

        function loadHeartSound() {
            if (players.heart) {
                players.heart.stop();
                // players.heart.dispose(); // Tone.jsのキャッシュバグ回避のため破棄しない
                players.heart = null;
            }
            players.heart = new Tone.Player({
                url: `./soundsource/heart/${heartFolder}.wav`,
                volume: -Infinity,
                onload: () => {
                    if (heartLoop) heartLoop.dispose();
                    heartLoop = new Tone.Loop(time => players.heart && players.heart.start(time), 60 / hrValue).start(0);
                }
            }).toDestination();
        }

        function startLungLoop() {
            if (masterLoop) masterLoop.dispose();
            masterLoop = new Tone.Loop(time => {
                ['normal_v', 'extra_v', 'bronchial'].forEach(k => players[k] && players[k].start(time));
                Tone.Draw.schedule(() => {
                    const bg = document.getElementById('breathing-group');
                    if (bg) {
                        bg.classList.remove('breathing-trigger', 'breathing-asthma');
                        void bg.offsetWidth;
                        bg.classList.add(lungFolder === "asthma" ? 'breathing-asthma' : 'breathing-trigger');
                    }
                }, time);
            }, 60 / rrValue).start(0);
            Tone.Transport.start();
            updateAnimations();
        }

        function setVolume(id, isOn) {
            if (!audioStarted) return;
            if (isOn) {
                let lungVol = volLevels[lungVolumeState];

                // 【絶対変更禁止エリア】気胸側の減衰率を -30dB に固定
                let attenuation = 0;
                const leftSide = [1, 3, 5, 7];
                const rightSide = [2, 4, 6, 8];
                if (lungFolder === 'left_pneumo' && leftSide.includes(id)) attenuation = -30;
                if (lungFolder === 'right_pneumo' && rightSide.includes(id)) attenuation = -30;

                if (lungVolumeState !== 1) {
                    let target = (id == 9) ? players.bronchial : players.extra_v;
                    if (lungFolder === "fc" && ![5, 6, 7, 8].includes(id)) target = players.normal_v;
                    if (target) target.volume.rampTo(lungVol + attenuation, 0.1);
                    ['normal_v', 'extra_v', 'bronchial'].forEach(k => { if (players[k] && players[k] !== target) players[k].volume.rampTo(-Infinity, 0.1); });
                }

                if (heartVolumeState !== 1 && players.heart && (id === 4 || id === 6)) {
                    players.heart.volume.rampTo(volLevels[heartVolumeState] - 5, 0.1);
                } else if (players.heart) {
                    players.heart.volume.rampTo(-Infinity, 0.1);
                }
                const pad = document.getElementById(`pad-btn${id}`);
                if (pad) pad.classList.add('active-pad');
            } else {
                ['normal_v', 'extra_v', 'bronchial', 'heart'].forEach(k => players[k] && players[k].volume.rampTo(-Infinity, 0.2));
                document.querySelectorAll('.pad').forEach(p => p.classList.remove('active-pad'));
            }
        }

        function updateAnimations() {
            let dur = (lungFolder === "asthma") ? 3.2 : (rrValue <= 18 ? 2.5 : 60 / rrValue);
            document.documentElement.style.setProperty('--move-duration', `${dur}s`);
        }

        function triggerClickSound() { if (audioStarted && clickSynth) clickSynth.triggerAttackRelease("C7", "32n"); }

        document.getElementById('rr-slider').addEventListener('input', e => { rrValue = parseInt(e.target.value); document.getElementById('rr-val').innerText = rrValue; if (masterLoop) masterLoop.interval = 60 / rrValue; updateAnimations(); });
        document.getElementById('hr-slider').addEventListener('input', e => { hrValue = parseInt(e.target.value); document.getElementById('hr-val').innerText = hrValue; if (heartLoop) heartLoop.interval = 60 / hrValue; });
        document.getElementById('lung-mute').addEventListener('click', () => { triggerClickSound(); lungVolumeState = (lungVolumeState + 1) % 4; document.getElementById('lung-mute-img').src = volIcons[lungVolumeState]; if (activePadId) setVolume(activePadId, true); });
        document.getElementById('heart-mute').addEventListener('click', () => { triggerClickSound(); heartVolumeState = (heartVolumeState + 1) % 4; document.getElementById('heart-mute-img').src = volIcons[heartVolumeState]; if (activePadId) setVolume(activePadId, true); });
        document.querySelectorAll('.lung-btn').forEach(btn => btn.addEventListener('click', () => { triggerClickSound(); lungFolder = btn.dataset.folder; document.querySelectorAll('.lung-btn').forEach(b => b.classList.toggle('active', b === btn)); loadLungSounds(); }));
        document.querySelectorAll('.heart-btn').forEach(btn => btn.addEventListener('click', () => { triggerClickSound(); heartFolder = btn.dataset.folder; document.querySelectorAll('.heart-btn').forEach(b => b.classList.toggle('active', b === btn)); loadHeartSound(); }));

        document.querySelectorAll('.pad').forEach(p => {
            const id = parseInt(p.id.replace('pad-btn', ''));
            p.addEventListener('pointerdown', (e) => { e.preventDefault(); activePadId = id; setVolume(id, true); });
            const stop = (e) => { e.preventDefault(); if (activePadId == id) { setVolume(id, false); activePadId = null; } };
            ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => p.addEventListener(ev, stop));
        });

        /* キーボード操作（Bluetoothキーボード等）への対応 */
        window.addEventListener('keydown', (e) => {
            if (!audioStarted) return;
            const key = e.key;
            if (key >= '1' && key <= '9') {
                const id = parseInt(key);
                if (activePadId !== id) {
                    activePadId = id;
                    setVolume(id, true);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (!audioStarted) return;
            const key = e.key;
            if (key >= '1' && key <= '9') {
                const id = parseInt(key);
                if (activePadId === id) {
                    setVolume(id, false);
                    activePadId = null;
                }
            }
        });
    </script>
</body>

</html>
